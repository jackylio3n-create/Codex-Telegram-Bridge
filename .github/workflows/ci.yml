name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Test
        run: go test ./cmd/... ./internal/...

      - name: Build
        run: go build ./cmd/bridge

      - name: Bash syntax
        run: |
          bash -n scripts/deploy/install-ubuntu.sh
          bash -n scripts/release/build-release.sh

      - name: Shellcheck
        run: shellcheck scripts/deploy/install-ubuntu.sh scripts/release/build-release.sh
